{% set python_min = "3.10" %}
{% set name = "numbacs" %}
{% set version = "0.1.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/numbacs-{{ version }}.tar.gz
  sha256: 6f03cd777d26ce145e01994494c370d509d790431c26b7bffcdfd4a7ac88bac6

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }},<3.12
    - interpolation >=2.2.6
    - numbalsoda
    - numba
    - contourpy
    - numpy
    - scipy

test:
  imports:
    - numbacs
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/numbacs/
  summary: Numba accelerated coherent structure package.
  dev_url: https://github.com/alb3rtjarvis/numbacs
  license: MPL-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - alb3rtjarvis
